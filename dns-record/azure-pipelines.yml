trigger: none

parameters:
  - name: REQUEST_ID
    type: string
  - name: PROJECT
    type: string
  - name: ACTION
    type: string

pool:
  name: 'skr-azure-pipeline'

variables:
  - group: terraform-dns-record
  - name: WORK_DIR
    value: '$(BASE_DIR)/runs/${{ parameters.REQUEST_ID }}'
  - name: STATE_DIR
    value: '$(BASE_DIR)/state/$(ENV)/${{ parameters.PROJECT }}/$(STACK)'
  - name: VAR_FILE
    value: 'records.auto.tfvars.json'

stages:
  - stage: Prepare
    jobs:
      - job: MergeVariables
        steps:
          - checkout: self

          - script: |
              # 파일 경로 설정
              mkdir -p $(WORK_DIR) $(STATE_DIR)
              cd $(WORK_DIR)
              
              mv $(Build.SourcesDirectory)/* $(WORK_DIR)
              
              # 기존 State 파일 확인
              STATE_FILE="$(WORK_DIR)/$(VAR_FILE)"
              
              if [ -f "$STATE_FILE" ]; then
                cp "$STATE_FILE" $(WORK_DIR)/merged.json
              else
                echo '{"private_dns_records":{}}' > $(WORK_DIR)/merged.json
              fi
              
              # Variable 병합을 위한 키 추출
              jq -c '.private_dns_records[] | "\(.resource_group_name)__\(.dns_zone_name)__\(.name)"' terraform.tfvars.json > record-keys.txt
              
              # Variable 병합을 위한 기존 파일 복사
              cp $(VAR_FILE) merged.json
              
              # Variable 병합
              while read -r target_key; do
                  target_key=$(echo "$target_key" | jq -r .)

                  if [ "${{ parameters.ACTION }}" = "delete" ]; then
                      jq --arg k "$target_key" \
                          '.private_dns_records |= with_entries(select(("\(.value.resource_group_name)__\(.value.dns_zone_name)__\(.value.name)") != $k))' \
                          merged.json > tmp.json && mv tmp.json merged.json
                  else
                      spec=$(jq -c --arg k "$target_key" \
                          '.private_dns_records[] | select("\(.resource_group_name)__\(.dns_zone_name)__\(.name)" == $k)' \
                          terraform.tfvars.json)
                      jq --arg k "$target_key" --argjson spec "$spec" \
                          '.private_dns_records |= (with_entries(select(("\(.value.resource_group_name)__\(.value.dns_zone_name)__\(.value.name)") != $k)) + {($k): $spec})' \
                          merged.json > tmp.json && mv tmp.json merged.json
                  fi
              done < record-keys.txt

              mv merged.json $(VAR_FILE)
              
              cat > backend.hcl <<EOF
              path = "$(STATE_DIR)/terraform.tfstate"
              EOF
            displayName: 'Prepare TFVars'

  - stage: Init
    dependsOn: Prepare
    jobs:
    - job: TerraformInit
      steps:
        - task: AzureCLI@2
          inputs:
            azureSubscription: 'SKR-Service-Connection'
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              cd $(WORK_DIR)
              terraform init -backend-config="backend.hcl"
            displayName: 'Terraform Init'

  - stage: Plan
    dependsOn: Init
    jobs:
    - job: TerraformPlan
      steps:
        - task: AzureCLI@2
          inputs:
            azureSubscription: 'SKR-Service-Connection'
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              cd $(WORK_DIR)
              terraform plan -var-file=$(VAR_FILE) -out=tfplan
              terraform show -json tfplan > tfplan.json
          displayName: 'Terraform Plan'

  - stage: Apply
    dependsOn: Plan
    jobs:
      - job: ApplyJob
        steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'SKR-Service-Connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                cd $(WORK_DIR)
                terraform apply -auto-approve tfplan
                cp $(VAR_FILE) $(STATE_DIR)/$(VAR_FILE)
            displayName: 'Terraform Apply'