trigger: none

parameters:
  - name: REQUEST_ID
    type: string
  - name: PROJECT
    type: string
  - name: ACTION
    type: string
  - name: ENV
    type: string
  - name: VARIABLE
    type: string
  - name: SUBSCRIPTION_ID
    type: string

pool:
  name: 'skr-azure-pipeline'

variables:
  - group: terraform-stg-acc
  - name: WORK_DIR
    value: '$(BASE_DIR)/runs/${{ parameters.REQUEST_ID }}'
  # 구독별로 state를 분리하기 위해 경로 최상위에 SUBSCRIPTION_ID를 둠.
  # subscription은 Azure에서 실제 리소스가 격리되는 물리적 경계이고 ENV/PROJECT는
  # 그 안의 라벨이므로, 디렉토리 계층도 subscription을 최상위로 두는 것이 실제 구조와 일치함
  - name: STATE_DIR
    value: '$(BASE_DIR)/state/${{ parameters.SUBSCRIPTION_ID }}/${{ parameters.ENV }}/${{ parameters.PROJECT }}/$(STACK)'
  - name: VAR_FILE
    value: 'stg-acc.auto.tfvars.json'

stages:
  - stage: Prepare
    jobs:
      - job: MergeVariables
        steps:
          - checkout: self

          - script: |
              set -e
              sudo mkdir -p $(WORK_DIR) $(STATE_DIR)
              sudo chown -R ubuntu:ubuntu $(BASE_DIR)
              cd $(WORK_DIR)

              {
              cat << 'EOF' > terraform.tfvars.json
              ${{ parameters.VARIABLE }}
              EOF

              mv $(Build.SourcesDirectory)/* $(WORK_DIR)

              # 기존 State 파일 확인
              STATE_FILE="$(STATE_DIR)/$(VAR_FILE)"
              if [ -f "$STATE_FILE" ]; then
                cp "$STATE_FILE" $(WORK_DIR)/merged.json
              else
                echo '{"storage_accounts":{}}' > $(WORK_DIR)/merged.json
              fi

              # Variable 병합을 위한 키 추출
              jq -c '.storage_accounts[] | .storage_account_config.name' terraform.tfvars.json > stg-acc-keys.txt

              # Variable 병합
              while read -r target_key; do
                  target_key=$(echo "$target_key" | jq -r .)
                  if [ "${{ parameters.ACTION }}" = "delete" ]; then
                      jq --arg k "$target_key" \
                          '.storage_accounts |= with_entries(select(.value.storage_account_config.name != $k))' \
                          merged.json > tmp.json && mv tmp.json merged.json
                  else
                      spec=$(jq -c --arg k "$target_key" \
                        '.storage_accounts[] | select(.storage_account_config.name == $k)' \
                          terraform.tfvars.json)
                      jq --arg k "$target_key" --argjson spec "$spec" \
                          '.storage_accounts |= (with_entries(select(.value.storage_account_config.name != $k)) + {($k): $spec})' \
                          merged.json > tmp.json && mv tmp.json merged.json
                  fi
              done < stg-acc-keys.txt

              # Terraform provider가 사용할 subscription_id를 tfvars에 병합
              jq --arg sub "${{ parameters.SUBSCRIPTION_ID }}" \
                  '. + {subscription_id: $sub}' \
                  merged.json > tmp.json && mv tmp.json merged.json

              mv merged.json $(VAR_FILE)

              cat > backend.hcl <<EOF
              path = "$(STATE_DIR)/terraform.tfstate"
              EOF
              } 2>error.log
            displayName: 'Prepare TFVars'

  - stage: Init
    dependsOn: Prepare
    jobs:
      - job: TerraformInit
        steps:
          - checkout: self

          - task: AzureCLI@2
            inputs:
              azureSubscription: 'shmanagegroup'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                cd $(WORK_DIR)
                terraform init -backend-config="backend.hcl" 2>error.log
            displayName: 'Terraform Init'

  - stage: Plan
    dependsOn: Init
    jobs:
      - job: TerraformPlan
        steps:
          - checkout: self

          - task: AzureCLI@2
            inputs:
              azureSubscription: 'shmanagegroup'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                cd $(WORK_DIR)
                terraform plan -var-file=$(VAR_FILE) -out=tfplan 2>error.log
                terraform show -json tfplan > tfplan.json
            displayName: 'Terraform Plan'

  - stage: NotifyPlanSuccess
    displayName: 'Notify Plan Success'
    dependsOn: Plan
    condition: succeeded('Plan')
    jobs:
      - job: SendPlanResult
        steps:
          - checkout: self

          - task: Bash@3
            displayName: 'Send Plan Result'
            inputs:
              targetType: 'inline'
              script: |
                set -e
                {
                PLAN_JSON=$(cat $(WORK_DIR)/tfplan.json | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | tr '\n' ' ' | tr '\t' ' ')

                curl -X POST "http://13.124.121.66:8000/api/plan/success" \
                  -H "Content-Type: application/json" \
                  -d @- <<EOF
                {
                  "pipelineId": "$(Build.BuildId)",
                  "status": "plan_success",
                  "requestId": "${{ parameters.REQUEST_ID }}",
                  "planResult": "${PLAN_JSON}"
                }
                EOF
                } 2>$(WORK_DIR)/error.log

  - stage: Apply
    dependsOn: Plan
    jobs:
      - deployment: ApplyJob
        environment: terraform-apply-approval
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  inputs:
                    azureSubscription: 'shmanagegroup'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set -e
                      cd $(WORK_DIR)
                      terraform apply -auto-approve tfplan 2>error.log
                      cp $(VAR_FILE) $(STATE_DIR)/$(VAR_FILE)
                  displayName: 'Terraform Apply'

  - stage: NotifyApplySuccess
    displayName: 'Notify Success'
    dependsOn: Apply
    condition: succeeded('Apply')
    jobs:
      - job: SendSuccess
        steps:
          - checkout: self

          - task: Bash@3
            displayName: 'Notify Pipeline Success'
            inputs:
              targetType: 'inline'
              script: |
                set -e
                curl -X POST "http://13.124.121.66:8000/api/pipeline/success" \
                  -H "Content-Type: application/json" \
                  -d "{\"requestId\": \"${{ parameters.REQUEST_ID }}\"}"

  # global error handler
  - stage: HandleFailure
    displayName: 'Global Error Handler'
    dependsOn:
      - Prepare
      - Init
      - Plan
      - NotifyPlanSuccess
      - Apply
    condition: and(always(), failed())
    jobs:
      - job: SendErrorLog
        steps:
          - checkout: self

          - task: Bash@3
            displayName: 'Notify Pipeline Failure with Local Logs'
            inputs:
              targetType: 'inline'
              script: |
                set -e
                LOG_FILE="$(WORK_DIR)/error.log"
                ERROR_MSG="상세 에러 로그 파일이 없습니다. Azure DevOps 콘솔을 확인하세요."

                if [ -f "$LOG_FILE" ]; then
                  ERROR_MSG=$(cat "$LOG_FILE" | sed 's/"/\\"/g' | tr '\n' ' ')
                fi

                curl -X POST "http://13.124.121.66:8000/api/pipeline/failed" \
                  -H "Content-Type: application/json" \
                  -d @- <<EOF
                {
                  "pipelineId": "$(Build.BuildId)",
                  "status": "failed",
                  "failedStage": "$(System.StageName)",
                  "requestId": "${{ parameters.REQUEST_ID }}",
                  "errorMessage": "${ERROR_MSG}"
                }
                EOF
